name: Validate

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependency
        run: python -m pip install --upgrade pip jsonschema

      - name: Compile report generator
        run: python -m py_compile scripts/generate_responsive_report.py

      - name: Validate sample input against JSON Schema
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import jsonschema

          schema = json.loads(Path("schemas/responsive-report.schema.json").read_text(encoding="utf-8"))
          sample = json.loads(Path("examples/sample-report-input.json").read_text(encoding="utf-8"))
          jsonschema.validate(instance=sample, schema=schema)
          print("JSON Schema validation passed.")
          PY

      - name: Generate sample reports
        run: |
          python scripts/generate_responsive_report.py \
            --input examples/sample-report-input.json \
            --format json md html \
            --output-dir artifacts \
            --strict

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: responsive-report-sample
          path: artifacts/
